services:
  - type: web
    name: agroflow-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: agroflow
      - key: PYTHON_VERSION
        value: 3.11.0
